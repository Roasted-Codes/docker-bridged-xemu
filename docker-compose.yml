---
# ============================================================================
# Roasted-Codes xemu + XLink Kai Docker Compose Configuration
# ============================================================================
# This configuration provides:
#   - xemu emulator with custom config management and automation
#   - XLink Kai for LAN gaming over the internet
#   - Tailscale subnet router for remote access
#   - dnsmasq for DHCP/DNS on the bridge network
#   - nettools sidecar (iperf3, mtr, tcpdump) for diagnostics
#   - Network telemetry: Prometheus + Grafana + network_exporter + xlink-monitor
#
# Features:
#   - CPU-only rendering (no GPU required)
#   - Automatic config symlinking to /config/emulator/xemu.toml
#   - Optional passleader automation script (auto-runs if present)
#   - XLink Kai for system link gaming over internet
#
# Based on: LinuxServer.io docker-xemu
# See CHANGELOG.md for all modifications
# ============================================================================

# Virtual LAN for xemu + XLink Kai communication
# Both containers share this bridge for layer 2 broadcast traffic
networks:
  xemu_lan:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-xemu_lan
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

volumes:
  tailscale-state:    # Persists Tailscale auth across container restarts
  prometheus-data:    # Persists Prometheus metrics (90-day retention)
  grafana-data:       # Persists Grafana dashboards and settings
  qmp-sock:           # Shared QMP unix socket between xemu and halo-scraper

services:
  xemu:
    build: ./services/xemu
    image: xemu-bridged:latest
    container_name: xemu
    privileged: true  # Required for packet capture (pcap) in bridged mode
    security_opt:
      - seccomp:unconfined
    cap_add:
      - NET_ADMIN    # Required for bridged networking (TAP device)
    devices:
      - /dev/net/tun:/dev/net/tun  # Required for bridged networking
      - /dev/uinput:/dev/uinput    # Required for Selkies virtual gamepad
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Etc/UTC
      # CPU-only rendering (no GPU required)
      - DISABLE_ZINK=true
      - DISABLE_DRI3=true
      # Selkies streaming (CPU-optimized defaults)
      - SELKIES_ENCODER=jpeg
      - SELKIES_FRAMERATE=30
      - SELKIES_JPEG_QUALITY=40
      - SELKIES_AUDIO_ENABLED=false
      - SELKIES_MICROPHONE_ENABLED=false
      - SELKIES_GAMEPAD_ENABLED=false
      - SELKIES_USE_PAINT_OVER_QUALITY=true
      - SELKIES_PAINT_OVER_JPEG_QUALITY=80
      # Passleader automation (set PASSLEADER_ENABLED=true in .env to enable)
      - PASSLEADER_ENABLED=${PASSLEADER_ENABLED:-false}
    volumes:
      - ./services/xemu/data:/config
      - ./services/xemu/init:/custom-cont-init.d  # Run setcap as root at init
      - qmp-sock:/run/qmp       # Shared QMP unix socket for halo-scraper
    ports:
      - "127.0.0.1:3000:3000"   # HTTP interface (localhost + SSH tunnel only)
      - "127.0.0.1:3001:3001"   # HTTPS interface (localhost + SSH tunnel only)
      # QMP port NOT published to host — Docker's userland proxy occupies QMP's
      # single-connection slot, blocking container-to-container access (StatsBorg).
      # Access QMP from host via: docker exec xemu socat - TCP:localhost:4444
      # - "127.0.0.1:4444:4444"
      # Ports bound to 127.0.0.1 so Docker's iptables DNAT rules don't
      # intercept container-to-container bridge traffic. Remote access
      # via Tailscale routes directly to 172.20.0.49, bypassing DNAT.
    networks:
      xemu_lan:
        ipv4_address: 172.20.0.49
    dns:
      - 127.0.0.11  # Docker's embedded resolver (will forward to dnsmasq)
      - 172.20.0.2  # Fallback to local dnsmasq
    shm_size: "1gb"
    depends_on:
      - dhcp  # Ensure DHCP/DNS is running before xemu
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: gateway
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/gateway/htpasswd:/etc/nginx/htpasswd:ro
      - ./services/gateway/landing.html:/usr/share/nginx/html/landing.html:ro
      - ./services/gateway/downloads:/usr/share/nginx/html/downloads:ro
      - ./services/gateway/ssl:/etc/nginx/ssl:ro
    ports:
      - "8081:80"
      - "8443:443"
    networks:
      xemu_lan:
        ipv4_address: 172.20.0.5
    depends_on:
      - xemu
      - halo-scraper
      - fileserver
    restart: unless-stopped

  fileserver:
    image: filebrowser/filebrowser
    container_name: fileserver
    command: --noauth --baseurl /files --root /srv
    volumes:
      - /home/linuxuser:/srv:ro
    networks:
      xemu_lan:
        ipv4_address: 172.20.0.6
    restart: unless-stopped

  halo-scraper:
    image: alpine:latest
    container_name: halo-scraper
    pid: "service:xemu"           # Share PID namespace — enables process_vm_readv
    privileged: true              # Required for /proc/<pid>/mem and process_vm_readv
    volumes:
      - /home/linuxuser/halo-scraper:/app:ro          # Binary + web assets
      - ./services/halo-scraper/data:/app/data         # Persistent DB + game history
      - ./services/halo-scraper/halo-scraper.toml:/app/halo-scraper.toml:ro
      - qmp-sock:/run/qmp:ro                           # QMP unix socket from xemu
    working_dir: /app
    entrypoint: ["/bin/sh", "-c", "while [ ! -S /run/qmp/qmp.sock ]; do sleep 1; done; exec ./scraper"]
    networks:
      xemu_lan:
        ipv4_address: 172.20.0.45
    depends_on:
      - xemu
    restart: unless-stopped

  xemu-cartographer:
    image: alpine:latest
    container_name: xemu-cartographer
    pid: "service:xemu"
    privileged: true
    volumes:
      - /home/linuxuser/xemu-cartographer:/app:ro
      - qmp-sock:/run/qmp:ro
    working_dir: /app
    entrypoint: ["/bin/sh", "-c", "while [ ! -S /run/qmp/qmp.sock ]; do sleep 1; done; exec ./cartographer"]
    networks:
      xemu_lan:
        ipv4_address: 172.20.0.46
    depends_on:
      - xemu
    restart: unless-stopped

  xlinkkai:
    image: ich777/xlinkkaievolution
    container_name: xlink
    environment:
      - INTERFACE_NAME=eth0  # Use container's bridge interface
      - UMASK=000
      - UID=99
      - GID=100
    volumes:
      - ./services/xlinkkai:/xlinkkaievolution
      - ./services/xlinkkai/user.sh:/opt/scripts/user.sh  # Auto-join arena on startup
    ports:
      - 34522:34522      # XLink Kai web interface
      - 30000:30000/udp  # P2P connections to orbital
      - 34523:34523/udp  # XLink Kai game tunneling
      - 9428:9428        # xlink-monitor Prometheus metrics
    networks:
      xemu_lan:
        ipv4_address: 172.20.0.25
    dns:
      - 127.0.0.11  # Docker's embedded resolver (will forward to dnsmasq)
      - 172.20.0.2  # Fallback to local dnsmasq
    privileged: true
    cap_add:
      - NET_ADMIN
    depends_on:
      - dhcp  # Ensure DHCP/DNS is running before xlinkkai
    restart: unless-stopped

  # tailscale:  # Disabled — re-enable when needed for remote access
  #   image: tailscale/tailscale:latest
  #   container_name: tailscale
  #   hostname: tailscale
  #   entrypoint: /bin/sh
  #   command: >
  #     -c "apk add --no-cache ethtool > /dev/null 2>&1;
  #         ethtool -K eth0 tx off 2>/dev/null || true;
  #         exec /usr/local/bin/containerboot"
  #   cap_add:
  #     - NET_ADMIN
  #     - NET_RAW
  #   sysctls:
  #     - net.ipv4.ip_forward=1
  #   environment:
  #     - TS_AUTHKEY=${TS_AUTHKEY}
  #     - TS_EXTRA_ARGS=--advertise-routes=172.20.0.0/24 --accept-dns=false
  #     - TS_STATE_DIR=/var/lib/tailscale
  #   volumes:
  #     - tailscale-state:/var/lib/tailscale
  #   ports:
  #     - 41641:41641/udp
  #   networks:
  #     xemu_lan:
  #       ipv4_address: 172.20.0.10
  #   restart: unless-stopped

  xbdm:
    image: alpine/socat
    container_name: xbdm
    entrypoint: /bin/sh
    command: >
      -c "apk add --no-cache ethtool > /dev/null 2>&1;
          ethtool -K eth0 tx off 2>/dev/null || true;
          exec socat TCP-LISTEN:731,reuseaddr,fork TCP:172.20.0.51:731"
    cap_add:
      - NET_ADMIN    # Required for ethtool to disable TX checksum offloading
    ports:
      - 127.0.0.1:731:731  # XBDM relay (localhost only, use SSH tunnel to access)
    networks:
      xemu_lan:
        ipv4_address: 172.20.0.11
    depends_on:
      - xemu
    restart: unless-stopped

  dhcp:
    image: drpsychick/dnsmasq
    container_name: dnsmasq
    cap_add:
      - NET_ADMIN    # Required for DHCP server
    networks:
      xemu_lan:
        ipv4_address: 172.20.0.2
    volumes:
      - ./services/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf:ro
    restart: unless-stopped

  # l2tunnel:
  #   build: ./services/l2tunnel
  #   container_name: l2tunnel
  #   cap_add:
