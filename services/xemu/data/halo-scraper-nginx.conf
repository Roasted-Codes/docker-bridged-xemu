# Cairo Station — public PGCR + password-protected dashboard
# Included by init script into /etc/nginx/conf.d/
#
# PUBLIC (no auth):   /ui/pgcr/  /api/games  /ui/style.css
# PRIVATE (auth):     /  /ui/debug/  /ui/tools/  /api/status  /ws  everything else

server {
  listen 9080 default_server;
  listen [::]:9080 default_server;

  root /config;

  # --- Public routes (no auth) ---

  # PGCR stats page
  location /ui/pgcr/ {
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Shared CSS
  location = /ui/style.css {
    proxy_pass http://127.0.0.1:9000;
    proxy_buffering off;
  }

  # Game history JSON files (used by PGCR viewer to load individual games)
  location /history/ {
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Games API (read-only)
  location /api/games {
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # --- Private routes (password required) ---

  # Landing page / dashboard
  location = / {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/halo-scraper-htpasswd;
    try_files /halo-scraper-landing.html =404;
  }

  # Debug dashboard
  location /ui/debug/ {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/halo-scraper-htpasswd;
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Tools page
  location /ui/tools/ {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/halo-scraper-htpasswd;
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Status API
  location /api/status {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/halo-scraper-htpasswd;
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # WebSocket
  location /ws {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/halo-scraper-htpasswd;
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Everything else — require auth too
  location / {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/halo-scraper-htpasswd;
    return 403;
  }
}
