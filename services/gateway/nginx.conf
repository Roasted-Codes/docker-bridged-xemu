# Cairo Station gateway — public PGCR + password-protected dashboard
# Reverse-proxies to halo-scraper container (172.20.0.45:9000)
#
# PUBLIC (no auth):   /ui/pgcr/  /api/games  /ui/style.css
# PRIVATE (auth):     /  /ui/debug/  /ui/tools/  /api/status  /ws  everything else

server {
  listen 80 default_server;
  listen [::]:80 default_server;

  root /usr/share/nginx/html;

  # --- Public routes (no auth) ---

  # PGCR stats page
  location /ui/pgcr/ {
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Live stats page (public — designed for LAN spectators)
  location /ui/live/ {
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Shared CSS
  location = /ui/style.css {
    proxy_pass http://172.20.0.45:9000;
    proxy_buffering off;
  }

  # Game history JSON files (used by PGCR viewer to load individual games)
  location /history/ {
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Games API (read-only)
  location /api/games {
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Overlay pages
  location /ui/overlay/ {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # --- Private routes (password required) ---

  # Landing page / dashboard
  location = / {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    try_files /landing.html =404;
  }

  # Debug dashboard
  location /ui/debug/ {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Tools page
  location /ui/tools/ {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Host list (used by debug page to discover xemu instances)
  location = /rooms {
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Status API
  location /api/status {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Players and series APIs (used by PGCR viewer leaderboards)
  location /api/players {
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location /api/series {
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Debug + memory APIs (private)
  location /api/logs {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location /api/debug/ {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location /api/mem/ {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location /api/hosts/ {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # WebSocket (public — page itself is behind auth, WS just streams game data)
  location /ws {
    proxy_pass http://172.20.0.45:9000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Everything else — require auth too
  location / {
    auth_basic "Cairo Station";
    auth_basic_user_file /etc/nginx/htpasswd;
    return 403;
  }
}
